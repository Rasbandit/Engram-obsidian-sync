name: CI

on:
  push:
    branches: ["**"]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type-check and build
        run: npm run build

      - name: Run tests
        run: npm test

  # Trigger backend E2E after plugin passes — tests full Obsidian ↔ backend sync
  trigger-e2e:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend E2E
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.CROSS_REPO_PAT }}" \
            https://api.github.com/repos/Rasbandit/Engram/dispatches \
            -d '{"event_type":"plugin-e2e-trigger","client_payload":{"plugin_ref":"${{ github.sha }}","plugin_branch":"${{ github.ref_name }}"}}'
